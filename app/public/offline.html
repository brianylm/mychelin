<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Mychelin</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #fbbf24 100%);
      color: #92400e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    
    .container {
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      padding: 3rem 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(146, 64, 14, 0.2);
      backdrop-filter: blur(10px);
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }
    
    h1 {
      margin: 0 0 1rem 0;
      color: #d97706;
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    p {
      margin: 0 0 1.5rem 0;
      line-height: 1.6;
      color: #92400e;
    }
    
    .retry-btn {
      background: #d97706;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }
    
    .retry-btn:hover {
      background: #b45309;
    }
    
    .retry-btn:active {
      transform: translateY(1px);
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
      }
      
      .icon {
        font-size: 3rem;
      }
      
      h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🍽️</div>
    <h1>You're offline</h1>
    <p>Please reconnect to continue using Mychelin and exploring your family's food heritage.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', function() {
      window.location.reload();
    });
    
    // Check if we can reach the server
    function checkConnection() {
      fetch('/', { method: 'HEAD', cache: 'no-cache' })
        .then(() => {
          window.location.reload();
        })
        .catch(() => {
          // Still offline, check again in 5 seconds
          setTimeout(checkConnection, 5000);
        });
    }
    
    // Start checking connection after 2 seconds
    setTimeout(checkConnection, 2000);
  </script>
</body>
</html>
